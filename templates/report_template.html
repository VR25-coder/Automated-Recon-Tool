<html>

<head>
    <title>Recon Report</title>
</head>

<body>

<h1>Recon Report</h1>

<h2>Target Domain</h2>
<p>{{ data.domain }}</p>

<h2>Subdomains</h2>

<ul>
{% for sub in data.subdomains %}
<li>{{ sub }}</li>
{% endfor %}
</ul>

<h2>Emails</h2>

<ul>
{% for email in data.emails %}
<li>{{ email }}</li>
{% endfor %}
</ul>

<h2>Technologies</h2>

<pre>{{ data.technologies }}</pre>

</body>
</html>
